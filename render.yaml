services:
  # Backend Web Service
  - type: web
    name: queryflow-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    disk:
      name: queryflow-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOW_ALL_ORIGINS
        value: "true"
      - key: SQLCURATION_DB_PATH
        value: /data/workspace.db
      - key: SQLCURATION_CHROMA_DIR
        value: /data/chroma_db
      - key: GROQ_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: queryflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: queryflow-backend
          type: web
          property: host
